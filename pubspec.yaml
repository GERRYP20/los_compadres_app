name: los_compadres_app
description: "Sistema de gestión para Ladrillera Los Compadres"
publish_to: 'none'

version: 1.0.1+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.15.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Importante: Estas líneas deben tener exactamente 2 espacios de sangría
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# Esta sección va pegada al margen izquierdo (0 espacios)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png" # <--- REVISA: Si tu imagen se llama 'icon.png', cámbialo aquí
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/